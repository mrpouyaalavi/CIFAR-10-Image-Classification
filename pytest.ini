[pytest]
# ── pytest configuration ────────────────────────────────────────────────────
# - testpaths        : where to discover tests
# - python_files     : naming convention for test modules
# - addopts          : default flags (short tracebacks, show reasons for
#                      skip/xfail, quiet progress output)
# - filterwarnings   : torchvision sometimes emits UserWarnings about
#                      pretrained-weight download progress that flood the
#                      CI log; we silence them so real warnings stand out.

testpaths = tests
python_files = test_*.py
addopts = -ra --tb=short --strict-markers
filterwarnings =
    ignore::DeprecationWarning:torch.*
    ignore::UserWarning:torchvision.*
