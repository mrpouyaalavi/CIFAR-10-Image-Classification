name: CI

# Run on every push and pull request targeting main. We intentionally do
# NOT run on tag pushes or forks of release branches — the portfolio
# project is small enough that PR + main coverage is sufficient.
#
# Security note: no step interpolates untrusted `github.event.*` inputs
# into shell commands. The only github-context value we read is
# `github.ref` for the concurrency group, which GitHub guarantees is safe
# because it's a fully-qualified git ref, not user text.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Match the runtime.txt target (3.11) plus one newer Python so we
        # notice torchvision / streamlit API drift early.
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install CPU-only torch wheels to keep the CI image small and
          # avoid the multi-GB CUDA bundle that pip would otherwise pull.
          # This mirrors the --extra-index-url in requirements.txt.
          pip install -r requirements-dev.txt

      - name: Run tests
        env:
          # Matplotlib's default backend tries to open a display which
          # GitHub Actions' Ubuntu runners don't have. Agg is headless.
          MPLBACKEND: Agg
          # Opt out of Streamlit's first-run welcome dialog so AppTest
          # renders cleanly in the CI environment.
          STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
        run: pytest -v

  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: python -m pip install ruff

      # Ruff is advisory on this repo — we surface style issues without
      # failing the pipeline because fixing every historical lint warning
      # is out of scope for the portfolio project. `continue-on-error`
      # keeps the output visible while not blocking PRs on lint alone.
      - name: Run ruff (advisory)
        continue-on-error: true
        run: ruff check .
